services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dyeing-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8000
    container_name: dyeing-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
